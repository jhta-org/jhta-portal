{{ define "main" }}
<section class="section">
  <div class="section-inner doc-single">

    <nav class="breadcrumb">
      <a href="/">ホーム</a> <span>/</span>
      <a href="/news/">ニュース</a> <span>/</span>
      <span>{{ .Title }}</span>
    </nav>

    <div class="doc-single-header">
      <div class="doc-single-meta">
        {{ range .Params.tags }}<span class="doc-category">{{ . }}</span>{{ end }}
      </div>
      <h1>{{ .Title }}</h1>
      <time class="doc-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006年1月2日" }}</time>
    </div>

    {{ if .Content }}
    <div class="doc-body">
      {{ .Content }}
    </div>
    {{ end }}

    <div class="doc-back">
      <a href="/news/" class="btn btn-outline">← ニュース一覧に戻る</a>
    </div>

  </div>
</section>
{{ end }}
