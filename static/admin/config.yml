# This file is generated by Terraform. Do not edit manually.
# Edit: jhta-infra/templates/decap-cms-config.yml.tftpl
backend:
  name: github
  repo: jhta-org/jhta-portal
  branch: main
  base_url: https://jhta-oauth.yhara.workers.dev

# ローカル開発用 (hugo server 起動時は local_backend: true に変更)
# local_backend: true

media_folder: static/uploads
public_folder: /uploads

locale: ja

collections:

  # ============================================================
  # 成果物・ドキュメント
  # ============================================================
  - name: documents
    label: 成果物・ドキュメント
    label_singular: 成果物
    folder: content/documents
    create: true
    slug: "{{slug}}"
    filter:
      field: _index
      value: false
    fields:
      - label: タイトル
        name: title
        widget: string
        hint: 成果物の名称（例：PMS データ標準 v1.0）

      - label: 公開日
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        default: ""

      - label: 概要説明
        name: description
        widget: text
        hint: 一覧ページに表示される短い説明文

      - label: カテゴリ
        name: category
        widget: select
        options:
          - { label: データ標準, value: データ標準 }
          - { label: API仕様, value: API仕様 }
          - { label: ガイドライン, value: ガイドライン }
          - { label: その他, value: その他 }
        default: データ標準

      - label: 関連WG
        name: wg
        widget: string
        required: false
        hint: 関連するワーキンググループID（例：WG-PMS-01）

      - label: 公開設定
        name: status
        widget: select
        options:
          - { label: 公開, value: public }
          - { label: 会員限定, value: members }
        default: public

      - label: ドキュメント・リンク
        name: files
        widget: list
        label_singular: ファイル/リンク
        hint: PDFファイルのURL、スプレッドシートのリンクなど複数追加できます
        fields:
          - label: 表示名
            name: name
            widget: string
            hint: 例：仕様書 v1.0 (PDF)、実装ガイド (スプレッドシート)

          - label: URL
            name: url
            widget: string
            hint: ファイルのURL（R2公開URL、Google Sheetsリンクなど）

          - label: 種別
            name: type
            widget: select
            options:
              - { label: PDF, value: pdf }
              - { label: スプレッドシート, value: spreadsheet }
              - { label: リンク, value: link }
            default: pdf

      - label: 本文（任意）
        name: body
        widget: markdown
        required: false
        hint: 詳細ページに表示される追加説明。不要な場合は空白でOK

  # ============================================================
  # ニュース
  # ============================================================
  - name: news
    label: ニュース
    label_singular: ニュース記事
    folder: content/news
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: タイトル
        name: title
        widget: string

      - label: 公開日
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: 本文
        name: body
        widget: markdown

      - label: タグ
        name: tags
        widget: list
        required: false

  # ============================================================
  # ワーキンググループ
  # ============================================================
  - name: workgroups
    label: ワーキンググループ
    label_singular: WG
    folder: content/workgroups
    create: true
    slug: "{{slug}}"
    filter:
      field: _index
      value: false
    fields:
      - label: タイトル
        name: title
        widget: string

      - label: WG ID
        name: wg_id
        widget: string
        hint: 例：WG-PMS-01

      - label: ステージ
        name: stage
        widget: select
        options:
          - { label: 業界課題提案, value: proposals }
          - { label: プレWG, value: pre-wg }
          - { label: WG（会員限定）, value: wg }
        default: proposals

      - label: 状態
        name: status
        widget: select
        options:
          - { label: 募集中, value: open }
          - { label: 活動中, value: active }
          - { label: 完了, value: completed }
        default: open

      - label: 説明
        name: description
        widget: text

      - label: 本文
        name: body
        widget: markdown
        required: false
